# =============================================================================
# Cadete Funcional (SCF) — Stack para Portainer
# =============================================================================
# Como usar no Portainer:
#   1. Stacks → Add Stack → "Repository" (branch: master) ou "Web editor"
#   2. Na aba "Environment variables" do Portainer, defina:
#        SECRET_KEY=<chave-secreta-longa>
#        POSTGRES_PASSWORD=<senha-forte>
#        ALLOWED_HOSTS=<ip-ou-dominio-do-servidor>
#   3. Deploy the stack
# =============================================================================

services:

  # ----------------------------------------------------------
  # Web: Django + Gunicorn
  # ----------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: cadete-funcional-web:latest
    environment:
      DJANGO_SETTINGS_MODULE: cadete_funcional.settings.prod
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      # localhost e 127.0.0.1 sempre incluídos para healthchecks internos funcionarem
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-localhost},localhost,127.0.0.1"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-saude}
      POSTGRES_USER: ${POSTGRES_USER:-saude}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SECURE_SSL_REDIRECT: "False"
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      USE_X_FORWARDED_HOST: "True"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://127.0.0.1:8000/healthz/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ----------------------------------------------------------
  # Banco de Dados: PostgreSQL 16
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saude}
      POSTGRES_USER: ${POSTGRES_USER:-saude}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saude}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saude} -d ${POSTGRES_DB:-saude}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Nginx: Reverse Proxy + Arquivos Estáticos
  # ----------------------------------------------------------
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: cadete-funcional-nginx:latest
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
