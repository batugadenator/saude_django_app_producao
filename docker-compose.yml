# =============================================================================
# Cadete Funcional (SCF) — Stack para Portainer
# =============================================================================
# Como usar no Portainer:
#   1. Stacks → Add Stack → "Repository" ou "Upload"
#   2. Cole o conteúdo deste arquivo
#   3. Preencha as variáveis de ambiente na seção "Environment variables"
#   4. Deploy the stack
#
# Variáveis obrigatórias (setar no Portainer ou no arquivo .env):
#   SECRET_KEY, POSTGRES_PASSWORD, ALLOWED_HOSTS
# =============================================================================

services:

  # ----------------------------------------------------------
  # Web: Django + Gunicorn
  # ----------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: cadete-funcional-web:latest
    env_file:
      - config/.env
    environment:
      DJANGO_SETTINGS_MODULE: cadete_funcional.settings.prod
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ----------------------------------------------------------
  # Banco de Dados: PostgreSQL 16
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    env_file:
      - config/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saude}
      POSTGRES_USER: ${POSTGRES_USER:-saude}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Nginx: Reverse Proxy + Arquivos Estáticos
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
